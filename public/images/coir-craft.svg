<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Alappuzha coir craft</title>
  <desc id="desc">Braided coir rope, a woven mat, and natural fiber craft objects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <pattern id="mat" width="44" height="44" patternUnits="userSpaceOnUse">
      <rect width="44" height="44" fill="#d6a65d"/>
      <path d="M0 22h44M22 0v44" stroke="#7c4a20" stroke-width="8" opacity=".55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="170" y="170" width="860" height="420" rx="34" fill="url(#mat)"/>
    <path d="M232 298c128-92 256-92 384 0s256 92 384 0" fill="none" stroke="#7c4a20" stroke-width="42" stroke-linecap="round"/>
    <path d="M232 392c128-92 256-92 384 0s256 92 384 0" fill="none" stroke="#92400e" stroke-width="42" stroke-linecap="round"/>
    <path d="M232 486c128-92 256-92 384 0s256 92 384 0" fill="none" stroke="#7c4a20" stroke-width="42" stroke-linecap="round"/>
    <circle cx="320" cy="252" r="62" fill="#fef3c7" stroke="#92400e" stroke-width="18"/>
    <circle cx="880" cy="510" r="62" fill="#fef3c7" stroke="#92400e" stroke-width="18"/>
  </g>
</svg>
