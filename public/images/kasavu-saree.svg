  <title id="title">Handwoven Kasavu saree</title>
  <desc id="desc">A folded cream Kasavu saree with a gold border and fine weave lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
