    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
